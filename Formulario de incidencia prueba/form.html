<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"> 
<title>Listado de incidencias</title>
<link rel="stylesheet" href="form.css">
</head>

<body>

<h2>Formulario de incidencias</h2>

<form id="formIncidencia">

<label>Número:</label>
<input type="number" id="numero" required>

<label>Nombre:</label>
<input type="text" id="nombre" required>

<label>Nº Ref. Paquete:</label>
<input type="text" id="ref" required>

<label>Fecha:</label>
<input type="date" id="fecha" required>

<label>Hora:</label>
<input type="time" id="hora" required>

<label>Incidencia:</label>
<input type="text" id="incidencia" required>

<button type="submit">Enviar</button>

</form>

<hr>

<h3>Resumen de incidencias</h3>

<div id="contenedor">
<p id="contadorTotal">Total: 0</p>
<p id="contadorPendientes">Pendientes: 0</p>
<p id="contadorEntregados">Entregados: 0</p>
<p id="contadorNo">No entregados: 0</p>
</div>

<hr>

<h2>Listado de incidencias</h2>

<table>
<thead>
<tr>
<th>Nº</th>
<th>Nombre</th>
<th>Ref</th>
<th>Fecha</th>
<th>Hora</th>
<th>Incidencia</th>
<th>Estado</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tablaIncidencias"></tbody>
</table>

<script src="form.js"></script>

</body>
</html>
